<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MJCRPG English</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #141E30, #243B55);
            color: #fff;
            transition: 0.3s;
        }

        .box {
            background: rgba(0, 0, 0, 0.6);
            padding: 35px;
            border-radius: 18px;
            width: 330px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 25px;
            background: #00ffcc;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .toggle-btn {
            background: #444;
            color: #fff;
        }

        .welcome {
            margin-top: 15px;
            color: #00ffcc;
            font-weight: bold;
        }

        #userCount {
            margin-top: 10px;
            font-size: 14px;
        }

        .light {
            background: #f2f2f2;
            color: #000;
        }

        .light .box {
            background: #fff;
            color: #000;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>

<body>

<div class="box">
    <h2>MJCRPG Login</h2>
    <p>Start your Spoken English Journey</p>

    <input type="text" id="name" placeholder="Your Full Name">
    <input type="tel" id="phone" placeholder="WhatsApp Number (optional)">
    <input type="email" id="email" placeholder="Email (optional)">

    <button onclick="login()" id="loginBtn">Login</button>
    <button onclick="toggleMode()" class="toggle-btn">Toggle Dark/Light Mode</button>

    <p id="userCount"></p>
    <div class="welcome" id="welcomeText"></div>
</div>

<script>

    // Auto redirect if already logged in
    window.onload = function () {
        if (localStorage.getItem("mj_user")) {
            window.location.href = "course.html";
        }

        updateUserCount();
    };

    // Press Enter to login
    document.addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
            login();
        }
    });

    function login() {
        let name = document.getElementById("name").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let email = document.getElementById("email").value.trim();
        let button = document.getElementById("loginBtn");
        let welcomeText = document.getElementById("welcomeText");

        if (name === "") {
            alert("Please enter your name");
            return;
        }

        if (email && !validateEmail(email)) {
            alert("Invalid email format");
            return;
        }

        if (phone && phone.length < 10) {
            alert("Invalid phone number");
            return;
        }

        let users = JSON.parse(localStorage.getItem("mj_users")) || [];

        // Prevent duplicate email
        if (email && users.some(user => user.email === email)) {
            alert("User with this email already exists!");
            return;
        }

        // Loading effect
        button.innerText = "Logging in...";
        button.disabled = true;

        setTimeout(() => {
            localStorage.setItem("mj_user", name);
            localStorage.setItem("currentDay", 1);

            users.push({
                name,
                phone,
                email,
                date: new Date().toLocaleString()
            });

            localStorage.setItem("mj_users", JSON.stringify(users));

            welcomeText.innerText = "Welcome " + name + "! 🎉 Login successful.";
            welcomeText.style.animation = "fadeIn 0.8s ease-in";

            updateUserCount();

            setTimeout(() => {
                window.location.href = "course.html";
            }, 1000);

        }, 800);
    }

    function validateEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function toggleMode() {
        document.body.classList.toggle("light");
    }

    function updateUserCount() {
        let users = JSON.parse(localStorage.getItem("mj_users")) || [];
        document.getElementById("userCount").innerText =
            "Total Registered Users: " + users.length;
    }

</script>

</body>
</html>
