<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MJCRPG Dashboard • 30 Days to Confident English</title>
  <meta name="description" content="30-Day Spoken English Course – Speak confidently with daily practice, voice notes, and community support."/>
  <style>
    :root {
      --primary: #10b981;
      --accent: #3b82f6;
      --glass: rgba(30,41,59,0.7);
      --border: rgba(148,163,184,0.2);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --success: #22c55e;
      --warning: #f59e0b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    .logo { font-size: 2rem; font-weight: 800; color: var(--primary); }
    .user { font-weight: 500; color: var(--muted); font-size: 1.1rem; }

    .section {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 1.2rem;
      padding: 2rem;
      margin: 2.5rem 0;
    }
    .section h3 { margin-bottom: 1.2rem; color: var(--accent); font-size: 1.5rem; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0;
    }
    .card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.8rem;
    }

    .progress-bar {
      height: 1.4rem;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
      margin: 1.2rem 0;
    }
    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 0.9s ease;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 1rem;
      border-radius: 0.8rem;
      border: 1px solid #475569;
      background: #1e293b;
      color: white;
      font-size: 1.05rem;
      resize: vertical;
      margin: 1rem 0;
    }

    .btn {
      padding: 0.9rem 1.8rem;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: #0f172a; }
    .btn-success { background: var(--success); color: white; }
    .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(16,185,129,0.3); }

    #feedback {
      margin-top: 1.2rem;
      padding: 1rem;
      border-radius: 0.8rem;
      font-weight: 500;
    }
    .feedback-good { background: rgba(34,197,94,0.2); color: #bbf7d0; border: 1px solid var(--success); }
    .feedback-medium { background: rgba(245,158,11,0.2); color: #fde68a; border: 1px solid var(--warning); }

    .center { text-align: center; margin: 3rem 0; }
  </style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo">MJCRPG Dashboard</div>
    <div class="user">Welcome back, <strong id="userName">Champion</strong></div>
  </header>

  <!-- Daily Practice Question -->
  <section class="section">
    <h3>Today's Speaking Practice</h3>
    <p style="color:var(--muted); margin-bottom:0.8rem;">Question / Task for today:</p>
    <div id="dailyTask" style="font-size:1.25rem; font-weight:500; min-height:60px; margin-bottom:1.5rem;">
      Loading today's task...
    </div>

    <p style="color:var(--muted); margin:1.5rem 0 0.6rem;">Your answer / spoken sentence (type here):</p>
    <textarea id="userResponse" placeholder="Write your full sentence or short paragraph here..."></textarea>

    <div style="display:flex; gap:1rem; flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="checkResponse()">Submit & Check</button>
      <button class="btn btn-outline" onclick="speakUserResponse()">🔊 Listen to my answer</button>
    </div>

    <div id="feedback"></div>
  </section>

  <!-- Progress -->
  <section class="section">
    <h3>Your Progress</h3>
    <div style="font-size:3.2rem; font-weight:800; color:var(--primary); text-align:center; margin:1rem 0;">
      Day <span id="currentDay">1</span>
    </div>
    <div class="progress-bar">
      <div id="progressBar"></div>
    </div>
    <p style="text-align:center;">
      Completed: <strong id="completed">0</strong> / 30 days • 
      Streak: <strong id="streak">0</strong> days 🔥
    </p>

    <div class="center">
      <button class="btn btn-success" onclick="completeToday()">Mark Today as Completed</button>
    </div>
  </section>

</div>

<script>
// ─── User & Progress ───────────────────────────────────────────────
const userName = localStorage.getItem("mj_user") || "Champion";
document.getElementById("userName").textContent = userName.split(" ")[0] || "Champion";

let currentDay = parseInt(localStorage.getItem("currentDay") || "1");
let completed = currentDay - 1;
let streak = parseInt(localStorage.getItem("mj_streak") || "0");

document.getElementById("currentDay").textContent = currentDay;
document.getElementById("completed").textContent = completed;
document.getElementById("streak").textContent = streak;
document.getElementById("progressBar").style.width = (completed / 30 * 100) + "%";

// ─── Daily Practice Questions (rotates every day) ──────────────────
const dailyQuestions = [
  "Introduce yourself in 2–3 sentences. (Name, where you're from, why you're learning English)",
  "Describe your daily morning routine in 4–5 sentences.",
  "Tell me about your favorite food and why you like it.",
  "What did you do last weekend? Use past tense.",
  "Explain how to make a cup of tea (step by step).",
  "Talk about your dream job and why you want it.",
  "Describe the weather today and how it makes you feel.",
  "Tell a short story about a funny moment in your life.",
  "What are 3 things you're grateful for today?",
  "Describe your city/village in 4–5 sentences.",
  "What would you do if you won 1 crore rupees?",
  "Explain the difference between 'borrow' and 'lend'. Give examples.",
  "Talk about a movie or web series you recently watched.",
  "Describe your best friend (looks + personality).",
  "What are your plans for the next 30 days?",
  "How do you usually celebrate your birthday?",
  "Explain how to order food in a restaurant (in English).",
  "Talk about a festival you like and why.",
  "Describe your favorite season and activities you do in it.",
  "What advice would you give to someone starting to learn English?",
  "Tell me about a goal you have for this year.",
  "Describe a place you want to visit and why.",
  "Explain the importance of learning English in today's world.",
  "Talk about a challenge you faced and how you overcame it.",
  "Describe your perfect day from morning to night.",
  "What are 3 things you want to improve about yourself?",
  "Explain how to ask for directions in English.",
  "Talk about a book or story that inspired you.",
  "Describe your family in 4–5 sentences.",
  "What does success mean to you?"
];

function getDailyQuestion() {
  const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
  const index = dayOfYear % dailyQuestions.length;
  return dailyQuestions[index];
}

document.getElementById("dailyTask").textContent = getDailyQuestion();

// ─── Check User Response ───────────────────────────────────────────
function checkResponse() {
  const response = document.getElementById("userResponse").value.trim();
  const feedbackEl = document.getElementById("feedback");

  if (response.length < 8) {
    feedbackEl.textContent = "Please write at least 8–10 words so I can give better feedback.";
    feedbackEl.className = "feedback-medium";
    return;
  }

  // Very simple heuristic feedback (you can make it smarter later)
  const hasGoodLength = response.split(" ").length >= 8;
  const hasQuestionMarkOrPeriod = /[.!?]/.test(response);
  const hasCapital = /^[A-Z]/.test(response);

  let msg = "Good effort! ";
  if (hasGoodLength) msg += "Nice length. ";
  if (hasCapital) msg += "Good start with capital letter. ";
  if (hasQuestionMarkOrPeriod) msg += "Proper punctuation — well done! ";
  msg += "Keep practicing every day!";

  feedbackEl.textContent = msg;
  feedbackEl.className = hasGoodLength && hasCapital ? "feedback-good" : "feedback-medium";
}

// ─── Speak User Response ───────────────────────────────────────────
function speakUserResponse() {
  const text = document.getElementById("userResponse").value.trim();
  if (!text) return alert("Please write something first.");

  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-IN';
    u.rate = 0.9;
    speechSynthesis.speak(u);
  } else {
    alert("Text-to-speech not supported in this browser.");
  }
}

// ─── Complete Day ──────────────────────────────────────────────────
function completeToday() {
  if (confirm("Have you finished today's practice?")) {
    currentDay = Math.min(31, currentDay + 1);
    completed = currentDay - 1;
    streak = (localStorage.getItem("mj_last") === new Date().toDateString()) ? streak : streak + 1;

    localStorage.setItem("currentDay", currentDay);
    localStorage.setItem("mj_streak", streak);
    localStorage.setItem("mj_last", new Date().toDateString());

    location.reload();
  }
}
</script>
</body>
</html>
